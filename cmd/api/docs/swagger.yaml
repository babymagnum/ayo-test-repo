          schema:
            $ref: '#/definitions/response.BaseResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete Player
      tags:
      - players
    get:
      description: Get player by ID
      parameters:
      - description: Player ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.PlayerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.BaseResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Player
      tags:
      - players
    put:
      consumes:
      - application/json
      description: Update player by ID (admin only)
      parameters:
      - description: Player ID
        in: path
        name: id
        required: true
        type: integer
      - description: Player data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.AddPlayerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.PlayerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.BaseResponse'
      security:
      - ApiKeyAuth: []
      summary: Update Player
      tags:
      - players
  /players/team/{teamId}:
    get:
      consumes:
      - application/json
      description: Get all players in a team with pagination
      parameters:
      - description: Team ID
        in: path
        name: teamId
        required: true
        type: integer
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.PlayersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.BaseResponse'
      security:
      - ApiKeyAuth: []
      summary: List Players by Team
      tags:
      - players
    post:
      consumes:
      - application/json
      description: Add a new player to a team (admin only)
      parameters:
      - description: Team ID
        in: path
        name: teamId
        required: true
        type: integer
      - description: Player data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.AddPlayerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.PlayerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.BaseResponse'
      security:
      - ApiKeyAuth: []
      summary: Create Player
      tags:
      - players
  /teams:
    get:
      consumes:
      - application/json
      description: Get all teams with pagination
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
