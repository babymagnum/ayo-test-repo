      security:
      - ApiKeyAuth: []
      summary: List Teams
      tags:
      - teams
    post:
      consumes:
      - application/json
      description: Add new team (admin only)
      parameters:
      - description: Team data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.AddTeamRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.TeamResponse'
        "400":
