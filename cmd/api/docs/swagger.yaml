    get:
      description: Get team by ID
      parameters:
      - description: Team ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.TeamResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.BaseResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Team
      tags:
      - teams
    put:
      consumes:
      - application/json
      description: Update team by ID (admin only)
      parameters:
      - description: Team ID
        in: path
        name: id
        required: true
        type: integer
      - description: Team data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.AddTeamRequest'
      produces:
